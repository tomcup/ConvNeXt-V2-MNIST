# ============================================================================
# 默认配置示例：全监督 + 动态叠加增强 + ConvNeXt V2 Femto (28×28)
# ============================================================================

model:
  name: "convnextv2_femto_mnist"
  in_channels: 1
  num_classes: 10

  stem:
    conv_kernel: 3
    conv_stride: 1
    conv_padding: 1
    out_channels: 48
    activation: "gelu"
    norm: "layernorm2d"

  stages:
    - {
        stage_index: 1,
        in_channels: 48,
        out_channels: 48,
        depth: 2,
        kernel_size: 7,
        stride: 1,
        drop_path_rate: 0.0,
      }
    - {
        stage_index: 2,
        in_channels: 48,
        out_channels: 96,
        depth: 2,
        kernel_size: 7,
        stride: 2,
        drop_path_rate: 0.05,
      }
    - {
        stage_index: 3,
        in_channels: 96,
        out_channels: 192,
        depth: 4,
        kernel_size: 7,
        stride: 2,
        drop_path_rate: 0.1,
      }
    - {
        stage_index: 4,
        in_channels: 192,
        out_channels: 384,
        depth: 2,
        kernel_size: 3,
        stride: 1,
        drop_path_rate: 0.15,
      }

  head:
    norm: "layernorm2d"
    dropout: 0.2
    hidden_dim: 384

# ----------------------------------------------------------------------------

data:
  image_size: 28
  mean: [0.5]
  std: [0.5]

  # 训练集（全量 413 万）
  train_images_path: "/path/to/train_images.npy"
  train_labels_path: "/path/to/train_labels.npy"
  # 验证集（从 MNIST-A 预留）
  val_images_path: "/path/to/val_images.npy"
  val_labels_path: "/path/to/val_labels.npy"

  # 测试集（用于最终推理）
  test_images_path: "/path/to/test_images.npy" # 若有标签可提供
  test_labels_path: null # 无标签则留空

  # 采样与加载
  train_samples_per_epoch: 80000 # 每个 epoch 随机抽取数量
  train_sampling_mode: "random" # 每个 epoch 完全随机洗牌后取子集
  val_mode: "fixed" # 验证集固定不变

  batch_size: 512
  num_workers: 2
  pin_memory: true

  # 验证时只做归一化，不应用训练增强（代码中默认处理）
  val_augmentation: false

# ----------------------------------------------------------------------------
augmentation:
  clean_prob: 0.15 # 15% 的训练图像完全不增强，保持干净

  # ========== 几何变换 ==========
  affine:
    probability: 0.4
    rotate: [-45, 45] # 大幅旋转
    shear: [-30, 30] # 剪切
    scale: [0.7, 1.3] # 极端缩放
    translate_percent: [0.1, 0.1] # 可移出视野

  elastic:
    probability: 0.4
    alpha: 150 # 避免位移过大，离开视野
    sigma: 6

  # ========== 遮挡与线条 ==========
  coarse_dropout:
    probability: 0.3
    num_holes_range: [1, 3]
    hole_height_range: [4, 12]
    hole_width_range: [4, 12]
    fill: "random_uniform"

  tiny_dropout: # 微小孔洞
    probability: 0.4
    num_holes_range: [3, 8]
    hole_height_range: [2, 4]
    hole_width_range: [2, 4]
    fill: "random_uniform"

  # 高强度高斯噪声与此效果类似，暂不使用
  # grid_dropout:
  #   probability: 1.0
  #   # probability: 0.2
  #   ratio: 0.2
  #   unit_size_range: [2, 4]
  #   random_offset: true
  #   fill: "random_uniform"

  prison_bars:
    probability: 0.2
    orientation: "random" # 'horizontal', 'vertical', 'random'
    bar_width_range: [1, 2] # 线宽随机范围
    spacing: [4, 5] # 基础间距范围
    jitter_max: 2 # 间距随机抖动最大像素
    color_range: [0, 255] # 线条灰度范围
    opacity_range: [0.1, 0.9] # 不透明度范围
    offset_random: true # 是否随机起始偏移

  # ========== 像素退化 ==========
  gaussian_blur:
    probability: 0.05
    blur_limit: [3, 5]
    sigma_limit: [0.5, 1.5]

  gauss_noise:
    probability: 0.5
    std_range: [0.05, 0.15] # 更强的噪声

  extreme_gauss_noise:
    probability: 0.05
    std_range: [0.15, 0.3] # 高斯噪声标准范围

  # ========== 反色 ==========
  random_invert: # 局部矩形反色
    probability: 0.25
    num_patches_min: 1
    num_patches_max: 4
    max_patch_size: 28

  # 结构性反色，增大矩形反色面积即可
  # grid_invert:
  #   probability: 1.0
  #   # probability: 0.25
  #   min_div: 2 # 最少横竖各2条分割（产生3x3网格）
  #   max_div: 4 # 最多4条分割（产生5x5网格）
  #   invert_prob: 0.5 # 每个网格区域被反色的概率

  # ========== 批量混合 ==========
  mixup_cutmix:
    use: true
    prob: 0.5
    switch_prob: 0.5
    mixup_alpha: 0.2
    cutmix_alpha: 1.0

# ----------------------------------------------------------------------------
training:
  seed: 24
  epochs: 500
  device: "xpu"
  mixed_precision: true # 纯 FP32，稳定
  amp_dtype: "float16"

  # 验证频率
  val_every_n_epochs: 5
  # 早停未启用，依靠保存最佳模型
  early_stopping_patience: null

  # 可选：梯度裁剪（默认关）
  gradient_clip_norm: null

  # 可选：torch.compile 加速（PyTorch 2.0+）
  use_compile: false

  # 训练恢复路径（若中断）
  resume_from: checkpoints/epoch_{epoch}.pth

# ----------------------------------------------------------------------------
optimizer:
  type: "adamw"
  lr: 0.001
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  type: "cosine"
  warmup_epochs: 5
  min_lr: 0.00001 # 最终降至 1e-5
# T_max 默认为 epochs - warmup_epochs，由代码自动计算

# ----------------------------------------------------------------------------
regularization:
  label_smoothing: 0.1
  ema_decay: 0.9999

# ----------------------------------------------------------------------------
inference:
  checkpoint: "checkpoints/best_ema.pth"
  batch_size: 512
  tta:
    num_views: 12
    scale_range: [0.9, 1.1]
    translate: 2 # 像素
    rotation: 10 # 度数 ±
    horizontal_flip: false
  output_file: "submission.csv"

# ----------------------------------------------------------------------------
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  use_tensorboard: true
  use_wandb: false
  save_every_n_epochs: 20
