# ============================================================================
# 默认配置：全监督 + 动态叠加增强 + ConvNeXt V2 Femto (28×28)
# ============================================================================

model:
  name: "convnextv2_femto_mnist"
  in_channels: 1
  num_classes: 10

  stem:
    conv_kernel: 3
    conv_stride: 1
    conv_padding: 1
    out_channels: 48
    activation: "gelu"
    norm: "layernorm2d"

  stages:
    - {
        stage_index: 1,
        in_channels: 48,
        out_channels: 48,
        depth: 2,
        kernel_size: 7,
        stride: 1,
        drop_path_rate: 0.0,
      }
    - {
        stage_index: 2,
        in_channels: 48,
        out_channels: 96,
        depth: 2,
        kernel_size: 7,
        stride: 2,
        drop_path_rate: 0.05,
      }
    - {
        stage_index: 3,
        in_channels: 96,
        out_channels: 192,
        depth: 4,
        kernel_size: 7,
        stride: 2,
        drop_path_rate: 0.1,
      }
    - {
        stage_index: 4,
        in_channels: 192,
        out_channels: 384,
        depth: 2,
        kernel_size: 3,
        stride: 1,
        drop_path_rate: 0.15,
      }

  head:
    norm: "layernorm2d"
    dropout: 0.2
    hidden_dim: 384

# ----------------------------------------------------------------------------

data:
  image_size: 28
  mean: [0.5]
  std: [0.5]

  # 训练集（全量 413 万）
  train_images_path: "/path/to/train_images.npy"
  train_labels_path: "/path/to/train_labels.npy"
  # 验证集（从 MNIST-A 预留）
  val_images_path: "/path/to/val_images.npy"
  val_labels_path: "/path/to/val_labels.npy"

  # 测试集（用于最终推理）
  test_images_path: "/path/to/test_images.npy" # 若有标签可提供
  test_labels_path: null # 无标签则留空

  # 采样与加载
  train_samples_per_epoch: 80000 # 每个 epoch 随机抽取数量
  train_sampling_mode: "random" # 每个 epoch 完全随机洗牌后取子集
  val_mode: "fixed" # 验证集固定不变

  batch_size: 512
  num_workers: 2
  pin_memory: true

  # 验证时只做归一化，不应用训练增强（代码中默认处理）
  val_augmentation: false

# ----------------------------------------------------------------------------
augmentation:
  # 几何变换
  affine:
    probability: 0.5
    rotate: [-30, 30]
    shear: [-20, 20]
    scale: [0.6, 1.4]
    translate_percent: [0.1, 0.1]
  elastic:
    probability: 0.4
    alpha: 120
    sigma: 15

  # 遮挡与线条
  coarse_dropout:
    probability: 0.5
    num_holes_range: [1, 5] # 孔洞数量 1~5 个
    hole_height_range: [1, 8] # 高度 1~8 像素
    hole_width_range: [1, 8] # 宽度 1~8 像素
  grid_dropout:
    probability: 0.4
    ratio: 0.2
    unit_size_range: [2, 4] # 单元大小范围
    random_offset: true

  # 像素退化
  gaussian_blur:
    probability: 0.3
    blur_limit: [3, 7]
    sigma_limit: [0.5, 3.0]
  gauss_noise:
    probability: 0.4
    std_range: [0.012, 0.027]

  # 仅支持 3 通道，无法使用
  # iso_noise:
  #   probability: 0.2

  # 局部反色（自定义）
  random_invert:
    probability: 0.3
    num_patches_min: 1
    num_patches_max: 3
    max_patch_size: 8

  # 批量混合（二选一逻辑清晰）
  mixup_cutmix:
    use: true
    # 以 prob 概率决定本 batch 是否采用混合
    prob: 0.5
    # 若启用，则以 switch_prob 决定使用 MixUp（否则用 CutMix）
    switch_prob: 0.5 # 0.5 代表两者等概率
    mixup_alpha: 0.2
    cutmix_alpha: 1.0

# ----------------------------------------------------------------------------
training:
  seed: 42
  epochs: 500
  device: "cuda"
  mixed_precision: true
  amp_dtype: "float16"

  # 验证频率
  val_every_n_epochs: 5
  # 早停
  early_stopping_patience: null #无效选项

  # 梯度裁剪
  gradient_clip_norm: null

  # 可选：torch.compile 加速（PyTorch 2.0+）
  use_compile: false

  # 训练恢复路径（若中断）
  resume_from: checkpoints/epoch_{epoch}.pth

# ----------------------------------------------------------------------------
optimizer:
  type: "adamw"
  lr: 0.001
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  type: "cosine"
  warmup_epochs: 5
  min_lr: 0.00001 # 最终降至 1e-5
# T_max 默认为 epochs - warmup_epochs，由代码自动计算

# ----------------------------------------------------------------------------
regularization:
  label_smoothing: 0.1
  ema_decay: 0.9999

# ----------------------------------------------------------------------------
inference:
  checkpoint: "checkpoints/best_ema.pth"
  batch_size: 512
  tta:
    num_views: 12
    scale_range: [0.9, 1.1]
    translate: 2 # 像素
    rotation: 10 # 度数 ±
    horizontal_flip: false
  output_file: "submission.csv"

# ----------------------------------------------------------------------------
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  use_tensorboard: true
  use_wandb: false
  save_every_n_epochs: 10
